<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<match target="font">
		<edit name="antialiasing" mode="assign"><bool>true</bool></edit>
		<edit name="rgba" mode="assign"><const>none</const></edit>
		<edit name="hinting" mode="assign"><bool>true</bool></edit>
		<edit name="hintstyle" mode="assign"><const>hintfull</const></edit> <!-- fractional -->
		<edit name="autohint" mode="assign"><bool>false</bool></edit> <!-- system native vs softer autohinter -->
	</match>

	<match target="pattern">
		<test qual="any" name="family">
			<string>system-ui</string>
		</test>
		<edit name="family" mode="prepend" binding="strong">
			<string>Wired Propo</string>
		</edit>
	</match>

	<match target="pattern">
		<edit name="family" mode="append" binding="weak">
			<string>Wired Propo</string>
		</edit>
	</match>
</fontconfig>
