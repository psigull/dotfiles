env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland


# theming
exec = gsettings set org.gnome.desktop.interface font-name 'Wired Propo 11'

env = QT_STYLE_OVERRIDE,Fusion
env = QT_LOGGING_RULES,"qt.qpa.gl=true"

env = GTK_THEME,Materia-dark-compact
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec = gsettings set org.gnome.desktop.interface gtk-theme 'Materia-dark-compact'

$cursorSize = 24
env = XCURSOR_SIZE,$cursorSize
env = HYPRCURSOR_SIZE,$cursorSize

env = QT_FONT_DPI,96
env = CHROMIUM_USER_FLAGS,--force-dark-mode --enable-features=WebUIDarkMode --disable-rgba-font-rendering


# fix programs
env = XDG_MENU_PREFIX,arch-
env = ELECTRON_TRASH,trash-cli
env = PROTON_NO_WM_DECORATION,1
env = SSH_AUTH_SOCK,$XDG_RUNTIME_DIR/ssh-agent.socket
env = OBS_USE_EGL,1

# prefer wayland
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = PROTON_ENABLE_WAYLAND,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QTWEBENGINE_FORCE_USE_GBM,1

# rAdV iS nOt A cOnFoRMaNt vUlKaN iMpLeMenTaTiOn
env = MESA_VK_IGNORE_CONFORMANCE_WARNING,true
