# programs
$mainMod = SUPER

$terminal = footclient
$fileManager = footclient -e sh -c 'source ~/.zshrc; y ~; exec $SHELL'

$lockscreen = hyprlock
$screenshot = hyprshot -szm region -o ~/screenshots

bind = $mainMod, Grave, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, L, exec, $lockscreen
bind = , SCROLL_LOCK, exec, $lockscreen

bind = $mainMod SHIFT, Z, exec, $screenshot
bind = , PRINT, exec, $screenshot
bind = $mainMod, N, exec, ~/.local/bin/changepaper.sh

bind = $mainMod, Q, killactive
bind = $mainMod, W, sendshortcut, CTRL, W, activewindow # consistency

bind = $mainMod, F, togglefloating,
bind = $mainMod, A, fullscreen, 1 # maximize
bind = $mainMod, B, fullscreen # borderless
bind = $mainMod, G, exec, ~/.local/bin/togglegaps.sh
bind = $mainMod, X, exec, hyprctl dispatch pin
bind = $mainMod, D, pseudo, # dwindle
bind = $mainMod, R, exec, ~/.local/bin/mastersplit.sh
bind = $mainMod, T, exec, ~/.local/bin/tileworkspace.sh
bind = $mainMod SHIFT, Escape, exit,

bind = $mainMod, Tab, exec, footclient -a float-term -e bash -c '/home/gull/.local/bin/launcher.sh'
bind = $mainMod, V, exec, footclient -a float-term "/home/gull/.local/bin/clip-menu.sh"

# focus mode
bindl = SUPER, backslash, exec, ~/.local/bin/focus.sh

# mac style cursor hotkeys
bind = $mainMod, backspace, sendshortcut, , delete, activewindow
bind = $mainMod, left, sendshortcut, , home, activewindow
bind = $mainMod, right, sendshortcut, , end, activewindow
bind = $mainMod, up, sendshortcut, , page_up, activewindow
bind = $mainMod, down, sendshortcut, , page_down, activewindow
bind = $mainMod SHIFT, left, sendshortcut, SHIFT, home, activewindow
bind = $mainMod SHIFT, right, sendshortcut, SHIFT, end, activewindow
bind = $mainMod SHIFT, up, sendshortcut, CTRL SHIFT, home, activewindow
bind = $mainMod SHIFT, down, sendshortcut, CTRL SHIFT, end, activewindow
bind = $mainMod CTRL, up, sendshortcut, CTRL, home, activewindow
bind = $mainMod CTRL, down, sendshortcut, CTRL, end, activewindow

# move focus with arrow keys
bind = $mainMod ALT, space, cyclenext,
bind = $mainMod ALT, left, movefocus, l
bind = $mainMod ALT, right, movefocus, r
bind = $mainMod ALT, up, movefocus, u
bind = $mainMod ALT, down, movefocus, d

# switch workspaces with 0-9
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move active window to workspace
bind = $mainMod, Escape, exec, ~/.local/bin/workspacemenu.sh
bind = $mainMod SHIFT, Grave, movetoworkspacesilent, emptynm
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:magic

# alt tab between workspaces
bind = ALT, Tab, workspace, m+1
bind = ALT SHIFT, Tab, workspace, m-1
bind = ALT, Grave, workspace, emptynm

# move/scale windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# hack for stylus
bindm = $mainMod, Space, movewindow
bindm = $mainMod ALT, Space, resizewindow
bind = $mainMod, Z, exec, ~/.local/bin/rightclick.sh

# media keys
$volstep = 5
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ $volstep%-
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ $volstep%+
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = $mainMod, XF86AudioPlay, exec, playerctl next
bindl = $mainMod SHIFT, XF86AudioPlay, exec, playerctl previous
bindl = CONTROL_L, Escape, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # mic mute

# emotes
bind = $mainMod, Period, exec, footclient -a float-term "/home/gull/.local/bin/emojimenu.sh"

binds = Control_R, minus, exec, wl-copy "—"
binds = Control_R, Comma, exec, wl-copy "–"
binds = Control_R, S, exec, wl-copy "¯\_(ツ)_/¯"
binds = Control_R, F, exec, wl-copy "(╯°□°)╯︵ ┻━┻"
binds = Control_R, U, exec, wl-copy "┬─┬ノ( º _ ºノ)"
binds = Control_R, print, exec, wl-copy "🖖"
binds = Control_R, F12, exec, wl-copy "🜃"
binds = Control_R, H, exec, wl-copy "♥"
binds = Control_R, R, exec, wl-copy "🤣"
binds = Control_R, T, exec, wl-copy "😂"
# need: lmao and rofl laughing emojis (some of the few really good emojis) and en-dash
