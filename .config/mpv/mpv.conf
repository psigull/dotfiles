force-window=immediate
keep-open=yes
hwdec=auto

loop-file=inf
save-position-on-quit=yes

osd-status-msg=${playback-time/full}  /  ${duration}   (${percent-pos}%)\n     ${estimated-frame-number}  /  ${estimated-frame-count}

ytdl-format="best"
ytdl-raw-options=force-ipv4=,no-check-certificates=,geo-bypass=,concurrent-fragments=4
user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
tls-verify=no
hls-bitrate=max

cache=yes
cache-pause=yes
cache-pause-initial=yes
cache-pause-wait=5
demuxer-readahead-secs=20
demuxer-max-bytes=50MiB
demuxer-max-back-bytes=50MiB
