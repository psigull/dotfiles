monitor.bluez.properties = {
    bluez5.codecs       = [ ldac ]
    bluez5.default.rate = 96000
}

monitor.bluez.rules = [
    {
        matches = [
            { device.name = "~bluez_card.*" }
        ]
        actions = {
            update-props = {
                bluez5.a2dp.ldac.quality = "sq"
            }
        }
    }
]
